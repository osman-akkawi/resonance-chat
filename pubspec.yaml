name: resonance_chat
description: "Resonance Chat — Connectivity Battery Model & Resonance Continuity Axiom in action."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # Firebase
  firebase_core: ^3.12.1
  firebase_auth: ^5.5.1
  cloud_firestore: ^5.6.5
  # Connectivity
  connectivity_plus: ^6.1.4
  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # Charts
  fl_chart: ^0.70.2
  # State
  provider: ^6.1.2
  # UUID
  uuid: ^4.5.1
  # Intl
  intl: ^0.20.1
  # Path provider
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
